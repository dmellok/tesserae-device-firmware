; PlatformIO Project Configuration File -- tesserae-device-firmware
;
; Multi-target Tesserae e-paper firmware: one codebase, one [env:...] per
; device. Each env selects a board (pin map + panel geometry + MCU tier +
; panel driver) via a -DTESSERAE_BOARD_* flag that boards/board.h dispatches
; on. The panel driver itself is bound at build time in src/panel/registry.c.
;
; Shared knobs live in [env] and are inherited by every target.

[env]
; Pinned to the pioarduino platform fork (ESP-IDF 5.5, ships the
; esp32-s3-devkitc1-n16r8 variant). The official registry "espressif32" does
; NOT carry that board, so this must be an explicit URL for reproducible CI.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
framework = espidf
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, direct
; Ed25519 verification for signed OTA manifests. Pin the exact upstream commit
; behind Monocypher 4.0.3 so a moved tag cannot silently change the crypto code.
lib_deps =
    https://github.com/LoupVaillant/Monocypher.git#ab2b16dd619ad5f6979a4fbe69cfa324a6fcc35f
; sdkconfig.defaults at the project root is picked up automatically by the
; ESP-IDF integration; no extra path needed here.

; -----------------------------------------------------------------------
; Phase 0 target -- Waveshare ESP32-S3-ePaper-13.3E6
;   - Module: ESP32-S3-WROOM-2-N32R16V (32 MB flash, 16 MB octal PSRAM)
;   - Panel:  13.3" 1200x1600 6-color Spectra E6, dual-controller (CS_M/CS_S)
;   - Driver family A: spectra6_spi_dual
;
; Built against the n16r8 PlatformIO variant (16 MB flash, 8 MB octal PSRAM).
; That fits comfortably inside the real module's larger flash/PSRAM; if you
; later want OTA + dual app slots, bump board_build.flash_size to 32MB and
; widen the factory partition in partitions.csv.
; -----------------------------------------------------------------------
[env:waveshare-133e6]
board = esp32-s3-devkitc1-n16r8

; FW_VERSION (reported in the status heartbeat) is injected by CI as an
; auto-incrementing 0.0.<build> string -- see .github/workflows/firmware.yml.
; Local builds have no flag and fall back to "0.0.0-dev" (include/app_config.h).
build_flags =
    -DTESSERAE_BOARD_WAVESHARE_133E6

board_build.partitions = partitions.csv
board_build.flash_size = 16MB

; -----------------------------------------------------------------------
; Phase 1 target -- Seeed reTerminal E1004
;   - MCU:   XIAO ESP32-S3 class (ESP32-S3 + PSRAM)
;   - Panel: 13.3" T133A01, dual-chip Spectra-6, 1200x1600
;   - Driver: spectra6_t133a01_dual (Family A variant; NOT the 13.3E6 blobs)
;
; Built against the same n16r8 S3+octal-PSRAM tier stand-in as the base (our
; pins come from boards/seeed_reterminal_e1004.h, not the PlatformIO board).
; Hardware inspection on a production E1004 found a 32 MB flash chip. This env
; therefore has an E1004-only A/B layout with two 4 MB OTA slots. Its explicit
; offsets keep the existing NVS partition at 0x9000 so a one-time USB migration
; can preserve WiFi credentials and device registration.
;
; The existing E1004 board/panel path is hardware-proven. The A/B migration was
; verified on a production unit with NVS preserved; rollback fault tests remain.
; -----------------------------------------------------------------------
[env:seeed-reterminal-e1004]
board = esp32-s3-devkitc1-n16r8
board_build.cmake_extra_args = -DSDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.e1004-ota.defaults"

build_flags =
    -DTESSERAE_BOARD_SEEED_E1004
    -DTESSERAE_OTA_CAPABILITY_ENABLED=1

board_build.partitions = partitions_e1004_ota.csv
board_build.flash_size = 32MB
board_upload.flash_size = 32MB

; Driver-only bring-up build for the E1004: on boot, init the panel and paint
; the 6 colour bars, then halt -- no WiFi/MQTT. Flash this first to validate
; the (unverified) T133A01 driver in isolation before the full firmware.
[env:seeed-reterminal-e1004-selftest]
extends = env:seeed-reterminal-e1004
build_flags =
    ${env:seeed-reterminal-e1004.build_flags}
    -DEPD_SELFTEST

; -----------------------------------------------------------------------
; Seeed reTerminal E1002 -- single-controller Spectra-6, 800x480 (Family B)
;   - Driver: spectra6_spi_single (ESP-IDF Spectra-6 update path,
;     confirmed working on real E1002 hardware).
; Same S3 + octal-PSRAM tier stand-in; pins come from the board header.
; -----------------------------------------------------------------------
[env:seeed-reterminal-e1002]
board = esp32-s3-devkitc1-n16r8

build_flags =
    -DTESSERAE_BOARD_SEEED_E1002

board_build.partitions = partitions_4m.csv
board_build.flash_size = 16MB

; Driver-only bring-up (colour bars, no networking) -- flash this first.
[env:seeed-reterminal-e1002-selftest]
extends = env:seeed-reterminal-e1002
build_flags =
    ${env:seeed-reterminal-e1002.build_flags}
    -DEPD_SELFTEST

; -----------------------------------------------------------------------
; Seeed reTerminal E1001 -- 7.5" mono (black/white), 800x480 (Family C)
;   - Driver: mono_spi (UC8179-class EP75; 1bpp packed frame, 48000 bytes).
; Same S3 + octal-PSRAM tier stand-in; pins come from the board header.
; -----------------------------------------------------------------------
[env:seeed-reterminal-e1001]
board = esp32-s3-devkitc1-n16r8

build_flags =
    -DTESSERAE_BOARD_SEEED_E1001

board_build.partitions = partitions_4m.csv
board_build.flash_size = 16MB

; Driver-only bring-up (mono stripes, no networking) -- flash this first.
[env:seeed-reterminal-e1001-selftest]
extends = env:seeed-reterminal-e1001
build_flags =
    ${env:seeed-reterminal-e1001.build_flags}
    -DEPD_SELFTEST

; -----------------------------------------------------------------------
; Seeed reTerminal E1003 -- 10.3" ED103TC2 grayscale via IT8951 (Family D)
;   - Driver: it8951_gray (4bpp 16-level GC16; 1872x1404; 1.3 MB frame).
; Same S3 + octal-PSRAM tier stand-in; pins come from the board header.
; The reTerminal E1003's real flash is unconfirmed (reported 32 MB); the
; 4 MB-factory table fits, flash with --flash-size detect.
; -----------------------------------------------------------------------
[env:seeed-reterminal-e1003]
board = esp32-s3-devkitc1-n16r8

build_flags =
    -DTESSERAE_BOARD_SEEED_E1003

board_build.partitions = partitions_4m.csv
board_build.flash_size = 16MB

; The E1003 module has a 32 MB Winbond flash on which esptool's stub loader
; fails at attach_flash ("chip stopped responding"); --no-stub flashes fine.
; App offset is the standard 0x10000 (no 0x20000 needed for our layout).
upload_flags = --no-stub

; Driver-only bring-up (16-level gray ramp, no networking) -- flash this first.
[env:seeed-reterminal-e1003-selftest]
extends = env:seeed-reterminal-e1003
build_flags =
    ${env:seeed-reterminal-e1003.build_flags}
    -DEPD_SELFTEST

; -----------------------------------------------------------------------
; Waveshare ESP32-S3 PhotoPainter -- 7.3" single-controller Spectra-6 (Family B)
;   - Module: ESP32-S3-WROOM-1-N16R8 (16 MB flash, 8 MB octal PSRAM)
;   - Driver: spectra6_spi_single (shared with the E1002; the board header
;     turns on EPD_ROTATE_180 + BOARD_HAS_PMIC for this unit).
;   - Power:  AXP2101 PMIC over I2C (panel rails + battery); no ADC divider.
; Same S3 + octal-PSRAM tier; pins come from the board header.
; -----------------------------------------------------------------------
[env:waveshare-photopainter-73]
board = esp32-s3-devkitc1-n16r8

build_flags =
    -DTESSERAE_BOARD_WAVESHARE_PHOTOPAINTER_73

board_build.partitions = partitions.csv
board_build.flash_size = 16MB

; Driver-only bring-up (colour bars, no networking) -- flash this first.
[env:waveshare-photopainter-73-selftest]
extends = env:waveshare-photopainter-73
build_flags =
    ${env:waveshare-photopainter-73.build_flags}
    -DEPD_SELFTEST

; -----------------------------------------------------------------------
; Seeed XIAO ePaper Driver Board EE02 -- 13.3" T133A01 dual Spectra-6 (Family A)
;   - Module: XIAO ESP32-S3 Plus (native USB, no CH340)
;   - Driver: spectra6_t133a01_dual (SHARED with the E1004; same T133A01 panel).
;     Only the pin map differs (from Seeed_GFX EE02 setup).
; The EE02 wires CS_M=GPIO44 / EN=GPIO43, which are UART0 TX/RX, so this env
; uses sdkconfig.ee02.defaults (console -> USB-Serial-JTAG) to free UART0.
; -----------------------------------------------------------------------
[env:seeed-ee02]
board = esp32-s3-devkitc1-n16r8
board_build.cmake_extra_args = -D SDKCONFIG_DEFAULTS=sdkconfig.usbjtag.defaults

build_flags =
    -DTESSERAE_BOARD_SEEED_EE02

board_build.partitions = partitions_4m.csv
board_build.flash_size = 16MB

; Driver-only bring-up (colour bars, no networking) -- flash this first.
[env:seeed-ee02-selftest]
extends = env:seeed-ee02
build_flags =
    ${env:seeed-ee02.build_flags}
    -DEPD_SELFTEST

; -----------------------------------------------------------------------
; Seeed XIAO ePaper 7.5" mono -- the panel in the TRMNL 7.5" OG DIY kit (Family C)
;   - Module: XIAO ESP32-S3 Plus (native USB, no CH340)
;   - Driver: mono_spi (SHARED with the E1001; same 800x480 1bpp mono panel).
;     Only the pin map differs (Seeed_GFX USE_XIAO_EPAPER_DRIVER_BOARD).
; Native-USB board -> console over USB-Serial-JTAG (sdkconfig.usbjtag.defaults).
; -----------------------------------------------------------------------
[env:xiao-epaper-75]
board = esp32-s3-devkitc1-n16r8
board_build.cmake_extra_args = -D SDKCONFIG_DEFAULTS=sdkconfig.usbjtag.defaults

build_flags =
    -DTESSERAE_BOARD_XIAO_EPAPER_75

board_build.partitions = partitions_4m.csv
board_build.flash_size = 16MB

; Driver-only bring-up (mono stripes, no networking) -- flash this first.
[env:xiao-epaper-75-selftest]
extends = env:xiao-epaper-75
build_flags =
    ${env:xiao-epaper-75.build_flags}
    -DEPD_SELFTEST

; -----------------------------------------------------------------------
; Seeed XIAO ePaper Display Board EE04 -- 7.5" mono, 24-pin FPC (Family C)
;   - Module: XIAO ESP32-S3 Plus (native USB, no CH340)
;   - Driver: mono_spi (SHARED with the E1001 / xiao-epaper-75; same 800x480
;     1bpp mono panel). Pin map is the single-CS subset of the EE02's.
; The EE04 also takes a 50-pin 7.3" Spectra-6 panel -- that's the separate
; seeed-ee04-73e6 env below; pick the env matching the attached panel and set
; the board's jumper caps to match (24-pin here).
; CS=GPIO44 / EN=GPIO43 are UART0 pins -> console on USB-Serial-JTAG.
; UNVERIFIED on hardware: community bring-up target (flash the selftest first).
; -----------------------------------------------------------------------
[env:seeed-ee04-75]
board = esp32-s3-devkitc1-n16r8
board_build.cmake_extra_args = -D SDKCONFIG_DEFAULTS=sdkconfig.usbjtag.defaults

build_flags =
    -DTESSERAE_BOARD_SEEED_EE04_75

board_build.partitions = partitions_4m.csv
board_build.flash_size = 16MB

; Driver-only bring-up (mono stripes, no networking) -- flash this first.
[env:seeed-ee04-75-selftest]
extends = env:seeed-ee04-75
build_flags =
    ${env:seeed-ee04-75.build_flags}
    -DEPD_SELFTEST

; -----------------------------------------------------------------------
; Seeed XIAO ePaper Display Board EE04 -- 7.3" Spectra-6, 50-pin FPC (Family B)
;   - Module: XIAO ESP32-S3 Plus (native USB, no CH340)
;   - Driver: spectra6_spi_single (SHARED with the E1002 / PhotoPainter 7.3;
;     same 800x480 single-controller Spectra-6 panel).
; Same board as seeed-ee04-75; jumper caps must be in the 50-pin position.
; CS=GPIO44 / EN=GPIO43 are UART0 pins -> console on USB-Serial-JTAG.
; UNVERIFIED on hardware: community bring-up target (flash the selftest first).
