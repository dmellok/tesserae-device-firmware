name: build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: build ${{ matrix.env }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env:
          - waveshare-133e6
          - seeed-reterminal-e1001
          - seeed-reterminal-e1002
          - seeed-reterminal-e1003
          - seeed-reterminal-e1004
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Cache the PlatformIO toolchain + ESP-IDF (the first build downloads
      # hundreds of MB; keyed on platformio.ini so it invalidates on a bump).
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini', 'sdkconfig.defaults') }}
          restore-keys: pio-${{ runner.os }}-

      - name: Install PlatformIO
        run: pip install -U platformio

      - name: Build ${{ matrix.env }}
        run: pio run -e ${{ matrix.env }}

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.env }}
          path: |
            .pio/build/${{ matrix.env }}/firmware.bin
            .pio/build/${{ matrix.env }}/firmware.factory.bin
          if-no-files-found: warn
