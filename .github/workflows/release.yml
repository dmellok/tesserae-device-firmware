name: release

# On a published GitHub Release, build every target, merge each into a single
# flashable factory image (offset 0), and publish the images + a catalog.json to
# the Cloudflare R2 bucket the tesserae.ink flasher reads. Cutting a release is
# all it takes for new firmware to appear in the browser flasher.
#
# The `sign` job additionally signs each target's APP-ONLY OTA image with the
# Tesserae OTA signing Worker and attaches the signed descriptors to the
# release. It runs in the protected `ota-signing` environment, so it waits for
# reviewer approval and does not gate the flasher publish.
#
# Requires repo secrets: CLOUDFLARE_API_TOKEN (R2 edit), CLOUDFLARE_ACCOUNT_ID;
# and, in the `ota-signing` ENVIRONMENT's secrets (not repo-wide): OTA_SIGN_TOKEN.
# Optional repo variable OTA_SIGN_URL overrides the signer base URL.
# The version is the release tag (e.g. v1.0.0), baked into FW_VERSION and the
# image filenames.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to build and publish (e.g. v1.0.0)'
        required: true

env:
  R2_BUCKET: tesserae-firmware

jobs:
  build:
    name: build ${{ matrix.env }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # kind = the board's TESSERAE_DEVICE_KIND (see boards/<env>.h): the id
        # the Tesserae hardware catalog keys on, and therefore the device_kind
        # the OTA signer stamps into each signed descriptor.
        include:
          - { env: waveshare-133e6,           kind: waveshare_133e6 }
          - { env: waveshare-photopainter-73, kind: waveshare_photopainter_73 }
          - { env: seeed-reterminal-e1001,    kind: seeed_reterminal_e1001 }
          - { env: seeed-reterminal-e1002,    kind: seeed_reterminal_e1002 }
          - { env: seeed-reterminal-e1003,    kind: seeed_reterminal_e1003 }
          - { env: seeed-reterminal-e1004,    kind: seeed_reterminal_e1004 }
          - { env: seeed-ee02,                kind: seeed_ee02 }
          - { env: xiao-epaper-75,            kind: xiao_epaper_75 }
          - { env: seeed-ee04-75,             kind: seeed_ee04_75 }
          - { env: seeed-ee04-73e6,           kind: seeed_ee04_73e6 }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Resolve version
        id: ver
        # version: raw tag (e.g. v1.2.0), used for the artifact + catalog paths.
        # fw_version: leading v stripped, baked into FW_VERSION so the /status
        # heartbeat reports plain SemVer (1.2.0). The server update check
        # compares that against the latest available build.
        run: |
          v='${{ github.event.release.tag_name || inputs.tag }}'
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "fw_version=${v#v}" >> "$GITHUB_OUTPUT"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini', 'sdkconfig.defaults') }}
          restore-keys: pio-${{ runner.os }}-

      - name: Install tools
        # Pin esptool to v4: its `merge_bin` subcommand + underscore flags
        # (--flash_mode/_freq/_size) differ from v5's hyphenated forms.
        run: pip install -U platformio && pip install "esptool<5"

      - name: Build ${{ matrix.env }}
        env:
          PLATFORMIO_BUILD_FLAGS: '-DFW_VERSION=\"${{ steps.ver.outputs.fw_version }}\"'
        run: pio run -e ${{ matrix.env }}

      # Merge the built images into one factory image flashed at offset 0, and
      # stage the same images as individual parts (offset-addressed) so the
      # flasher can write them without touching the NVS region at 0x9000 --
      # that's what preserves Wi-Fi creds + registration on a re-flash/migration.
      # Factory-layout boards put the app at 0x10000; OTA-layout boards (E1004
      # A/B, detected via ota_data_initial.bin) put otadata at 0x10000 and the
      # app at 0x20000. Merging the app at 0x10000 on an OTA layout produces an
      # UNBOOTABLE image (the v1.6.0/v1.6.1 E1004 factory bins had this bug).
      # `keep` leaves the flash mode/freq/size as the build set them.
      - name: Merge + hash
        run: |
          set -euo pipefail
          v='${{ steps.ver.outputs.version }}'
          e='${{ matrix.env }}'
          b=".pio/build/$e"
          mkdir -p dist
          bin="dist/$e-$v.factory.bin"
          if [ -f "$b/ota_data_initial.bin" ]; then
            python -m esptool --chip esp32s3 merge_bin -o "$bin" \
              --flash_mode keep --flash_freq keep --flash_size keep \
              0x0 "$b/bootloader.bin" \
              0x8000 "$b/partitions.bin" \
              0x10000 "$b/ota_data_initial.bin" \
              0x20000 "$b/firmware.bin"
            parts='bootloader.bin:0x0 partitions.bin:0x8000 ota_data_initial.bin:0x10000 firmware.bin:0x20000'
          else
            python -m esptool --chip esp32s3 merge_bin -o "$bin" \
              --flash_mode keep --flash_freq keep --flash_size keep \
              0x0 "$b/bootloader.bin" \
              0x8000 "$b/partitions.bin" \
              0x10000 "$b/firmware.bin"
            parts='bootloader.bin:0x0 partitions.bin:0x8000 firmware.bin:0x10000'
          fi
          sha=$(shasum -a 256 "$bin" | awk '{print $1}')
          parts_json='['
          sep=''
          for p in $parts; do
            f="${p%%:*}"; off="${p##*:}"
            name="${f%.bin}"
            cp "$b/$f" "dist/$e-$v.part-$name.bin"
            psha=$(shasum -a 256 "$b/$f" | awk '{print $1}')
            parts_json="$parts_json$sep{\"name\":\"$name\",\"offset\":\"$off\",\"path\":\"$e/$v/$name.bin\",\"sha256\":\"$psha\"}"
            sep=','
          done
          parts_json="$parts_json]"
          cat > "dist/$e.meta.json" <<JSON
          {"env":"$e","chipFamily":"ESP32-S3","offset":0,"webSerial":true,"version":"$v","path":"$e/$v.factory.bin","sha256":"$sha","parts":$parts_json}
          JSON

      # The app-only OTA image (what a device streams into its inactive slot),
      # as opposed to the merged factory image above (USB flashing). OTA signing
      # is detached -- the .bin is never modified or repackaged; the SAME binary
      # serves manual flashing and OTA, and the signature lives in a sidecar
      # descriptor. The catalog builder only globs *.meta.json, so staging this
      # here does not affect the flasher publish.
      - name: Stage app image (OTA signing input)
        run: cp ".pio/build/${{ matrix.env }}/firmware.bin" "dist/${{ matrix.kind }}.app.bin"

      - uses: actions/upload-artifact@v4
        with:
          name: fw-${{ matrix.env }}
          path: dist/
          if-no-files-found: error

  publish:
    name: publish to R2
    needs: build
    runs-on: ubuntu-latest
    # The browser flasher must only ever offer stable firmware, so pre-releases
    # (e.g. v1.6.0-rc1 OTA canaries) are excluded from the R2 catalog publish.
    # The build + sign jobs still run, so a pre-release's signed OTA descriptors
    # are produced and attached to the GitHub Release for canary/bench testing
    # without the images appearing at tesserae.ink. A release event uses GitHub's
    # prerelease flag; a manual workflow_dispatch keys off a SemVer pre-release
    # hyphen in the tag (e.g. 1.6.0-rc1).
    if: >-
      (github.event_name == 'release' && github.event.release.prerelease == false) ||
      (github.event_name == 'workflow_dispatch' && !contains(inputs.tag, '-'))
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: fw-*
          merge-multiple: true

      - name: Install wrangler
        run: npm i -g wrangler

      - name: Fetch existing catalog
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if ! wrangler r2 object get "$R2_BUCKET/catalog.json" --remote --file existing-catalog.json 2>/dev/null; then
            echo '{}' > existing-catalog.json
          fi

      - name: Assemble catalog
        run: |
          python tools/build_catalog.py artifacts existing-catalog.json catalog.json \
            "${{ github.event.release.tag_name || inputs.tag }}"

      - name: Upload images + catalog to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          # Retry each object put: the Cloudflare API occasionally 502s a
          # single request (killed the v1.6.5 publish), and with parts the
          # job now uploads ~45 objects -- any one flake must not fail the
          # run. Re-puts are idempotent (fixed per-version keys). The catalog
          # goes LAST, only after every object it references is in place.
          put() {
            for attempt in 1 2 3 4 5; do
              if wrangler r2 object put "$R2_BUCKET/$2" --file "$1" --remote ${3:+--content-type "$3"}; then
                return 0
              fi
              echo "::warning::put $2 failed (attempt $attempt); backing off"
              sleep $(( attempt * 15 ))
            done
            echo "::error::put $2 failed after 5 attempts"
            return 1
          }
          while IFS=$'\t' read -r local key; do
            echo "put $key"
            put "$local" "$key"
          done < upload_manifest.tsv
          put catalog.json catalog.json application/json

  # Detached OTA signing via the Tesserae OTA signing Worker. Per device kind:
  # POST the app-only .bin to the Worker, which signs it with the active
  # production key (and uploads the image to R2 itself -- hosting is part of the
  # call); keep the returned descriptor as an artifact + release asset.
  #
  # SECURITY: OTA_SIGN_TOKEN authorises signing ARBITRARY bytes with the
  # production key, so it is nearly as sensitive as the key itself. It lives in
  # the PROTECTED `ota-signing` GitHub Environment (Settings -> Environments:
  # create it with required reviewers and add OTA_SIGN_TOKEN to ITS secrets, not
  # the repo's). This job therefore pauses for reviewer approval; the flasher
  # publish above is deliberately not gated by it. The token is only ever sent
  # as an Authorization header (never in a URL, never echoed); response headers
  # are never logged. This workflow has no pull_request trigger, so fork PRs
  # can never reach the token.
  #
  # SCOPE: signing + hosting + publishing the descriptor is the whole job.
  # Rollout (offering the update to devices) is a separate, deliberate step
  # done against the Tesserae server, never from CI.
  sign:
    name: sign OTA images
    needs: build
    runs-on: ubuntu-latest
    environment: ota-signing
    permissions:
      contents: write   # attach descriptor-<kind>.json to the release
    steps:
      - name: Resolve version
        id: ver
        run: |
          v='${{ github.event.release.tag_name || inputs.tag }}'
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "fw_version=${v#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: fw-*
          merge-multiple: true

      - name: Sign each app image
        env:
          OTA_SIGN_TOKEN: ${{ secrets.OTA_SIGN_TOKEN }}
          # Base URL as a repo variable so it can move to a custom domain
          # without editing the workflow.
          OTA_SIGN_URL: ${{ vars.OTA_SIGN_URL || 'https://tesserae-ota-signer.dmellok.workers.dev' }}
        run: |
          set -euo pipefail
          fw='${{ steps.ver.outputs.fw_version }}'
          mkdir -p descriptors
          shopt -s nullglob
          bins=(artifacts/*.app.bin)
          if [ ${#bins[@]} -eq 0 ]; then
            echo "no staged app images found in artifacts/" >&2
            exit 1
          fi
          for bin in "${bins[@]}"; do
            kind=$(basename "$bin" .app.bin)
            echo "signing $kind @ $fw ($(stat -c%s "$bin") bytes)"
            code=$(curl -sS -o resp.json -w '%{http_code}' \
              -X POST "$OTA_SIGN_URL/sign?device_kind=$kind&fw_version=$fw" \
              -H "Authorization: Bearer $OTA_SIGN_TOKEN" \
              --data-binary "@$bin")
            # Hard-fail on any non-200, an "error" key, or a missing descriptor.
            # The response BODY is safe to print for diagnosis; headers are not
            # logged anywhere.
            if [ "$code" != "200" ]; then
              echo "signer returned HTTP $code for $kind:" >&2
              cat resp.json >&2
              exit 1
            fi
            if ! jq -e 'has("error") | not' resp.json > /dev/null; then
              echo "signer reported an error for $kind:" >&2
              cat resp.json >&2
              exit 1
            fi
            if ! jq -e '.descriptor.payload and .descriptor.signature' resp.json > /dev/null; then
              echo "signer response for $kind has no descriptor:" >&2
              cat resp.json >&2
              exit 1
            fi
            got=$(jq -r '.manifest.fw_version // empty' resp.json)
            if [ "$got" != "$fw" ]; then
              echo "manifest fw_version '$got' does not match tag version '$fw'" >&2
              exit 1
            fi
            # Fetchability probe: 1-byte ranged GET, not HEAD -- the Worker only
            # routes GET on /firmware/* (HEAD 404s even though the image is there).
            url=$(jq -r '.image_url // empty' resp.json)
            if [ -z "$url" ] || ! curl -sf -r 0-0 -o /dev/null "$url"; then
              echo "image_url missing or not fetchable for $kind: ${url:-<none>}" >&2
              exit 1
            fi
            jq '.descriptor' resp.json > "descriptors/descriptor-$kind.json"
            rm -f resp.json
            echo "signed $kind -> descriptors/descriptor-$kind.json (image: $url)"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: ota-descriptors
          path: descriptors/
          if-no-files-found: error

      - name: Attach descriptors to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          tag='${{ steps.ver.outputs.version }}'
          if gh release view "$tag" > /dev/null 2>&1; then
            gh release upload "$tag" descriptors/descriptor-*.json --clobber
          else
            # workflow_dispatch against a tag with no GitHub Release: the
            # descriptors are still published as the ota-descriptors artifact.
            echo "no GitHub release for $tag; skipping asset attach"
          fi
